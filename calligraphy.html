<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@300;400;600&family=Ma+Shan+Zheng&display=swap');
:root{--bg:#faf6f0;--card:rgba(255,255,255,.7);--text:#2c2416;--accent:#c0392b;--accent2:#8b4513;--gold:#d4a76a;--shadow:0 8px 32px rgba(0,0,0,.08)}
body{font-family:'Inter','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;background-image:radial-gradient(ellipse at 20% 50%,rgba(212,167,106,.08) 0,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(192,57,43,.06) 0,transparent 50%)}
.header{width:100%;text-align:center;padding:50px 20px 20px;position:relative}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,var(--gold),var(--accent),var(--gold),transparent)}
.logo{font-size:42px;font-weight:900;font-family:'Ma Shan Zheng',serif;background:linear-gradient(135deg,#8b4513,#c0392b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px}
.subtitle{margin-top:6px;color:#8b7355;font-size:14px;letter-spacing:3px}
.container{max-width:950px;width:100%;padding:0 20px 60px}
.card{background:var(--card);backdrop-filter:blur(12px);border-radius:20px;padding:32px;margin-top:24px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.5)}
.card-title{font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-weight:600}
.form-row{display:flex;gap:12px;flex-wrap:wrap}.form-group{flex:1;min-width:160px}
label{display:block;font-size:13px;color:#8b7355;margin-bottom:4px;font-weight:600;letter-spacing:1px}
input,select,textarea{width:100%;padding:12px 16px;border:1.5px solid #e8ddd0;border-radius:12px;font-size:15px;outline:none;background:rgba(255,255,255,.6);font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,167,106,.15)}
textarea{min-height:80px;resize:vertical}
.btn{width:100%;margin-top:16px;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:.3s;letter-spacing:2px;background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;font-family:inherit}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(192,57,43,.25)}.btn:active{transform:translateY(0)}
.btn-secondary{background:linear-gradient(135deg,#8b4513,#a0522d)}.btn-outline{background:transparent;color:var(--accent2);border:2px solid var(--gold)}.btn-outline:hover{background:var(--gold);color:#fff}
.sheet-container{background:#fff;border-radius:16px;padding:32px 24px;margin-top:24px;box-shadow:var(--shadow);display:none}.sheet-container.show{display:block}
.sheet-title{font-size:24px;font-weight:700;text-align:center;margin-bottom:24px;font-family:'Ma Shan Zheng',serif;color:var(--accent2)}
.sheet-meta{text-align:center;margin-bottom:20px;color:#8b7355;font-size:14px;line-height:1.6}
.sheet-grid{display:grid;gap:0;justify-content:center;margin:0 auto}
.grid-cell{position:relative;display:flex;align-items:center;justify-content:center;background:#fff;border:0.5px solid #ddd;overflow:hidden}
.grid-cell .tianzi{position:absolute;inset:0;pointer-events:none}
.grid-cell .tianzi::before{content:'';position:absolute;top:0;left:50%;width:0.5px;height:100%;background:rgba(192,57,43,.12)}
.grid-cell .tianzi::after{content:'';position:absolute;left:0;top:50%;height:0.5px;width:100%;background:rgba(192,57,43,.12)}
.grid-cell .tianzi-diag1{position:absolute;inset:0;background:linear-gradient(135deg,transparent calc(50%-0.5px),rgba(192,57,43,.12) calc(50%-0.5px),rgba(192,57,43,.12) calc(50%+0.5px),transparent calc(50%+0.5px))}
.grid-cell .tianzi-diag2{position:absolute;inset:0;background:linear-gradient(225deg,transparent calc(50%-0.5px),rgba(192,57,43,.12) calc(50%-0.5px),rgba(192,57,43,.12) calc(50%+0.5px),transparent calc(50%+0.5px))}
.grid-cell .char-text{line-height:1;z-index:2;position:relative}
.grid-cell .char-trace{position:absolute;inset:4px;z-index:1;opacity:.12;display:flex;align-items:center;justify-content:center;color:#666;pointer-events:none}
.grid-cell .stroke-order{position:absolute;bottom:2px;right:4px;font-size:10px;color:var(--accent);z-index:3;font-weight:700;background:rgba(255,255,255,.8);padding:0 3px;border-radius:3px}
.pinyin-row{display:flex;justify-content:center;gap:0;margin-top:4px;flex-wrap:wrap}
.pinyin-item{text-align:center;font-size:13px;color:#8b7355}
.meaning-row{display:flex;justify-content:center;gap:0;margin-top:2px;flex-wrap:wrap;font-size:11px;color:#999}
@media print{
  body{background:#fff!important;padding:0!important}
  .header,.no-print{display:none!important}
  .sheet-container{box-shadow:none!important;padding:20px!important;margin:0!important;border-radius:0!important}
  .grid-cell{border-color:#ccc!important}
  .grid-cell .tianzi::before,.grid-cell .tianzi::after{background:rgba(100,100,100,.2)!important}
  @page{margin:15mm}
}
.options-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
.option-group{display:flex;align-items:center;gap:6px;font-size:13px;color:#8b7355}
.option-group input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold)}
.english-display{text-align:center;margin-bottom:16px;font-size:16px;color:#8b7355;font-style:italic}
.badge-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.badge-tag{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #e0d5c8;background:rgba(255,255,255,.4);color:#8b7355;transition:.2s}
.badge-tag:hover{background:var(--gold);color:#fff;border-color:var(--gold)}
.loading{text-align:center;padding:20px;color:var(--gold);font-size:14px}
.loading .spinner{display:inline-block;width:20px;height:20px;border:3px solid #f0e6d8;border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#2c2416;color:#fff;padding:12px 24px;border-radius:30px;font-size:14px;opacity:0;transition:.4s;z-index:200;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){.grid-cell .char-text,.grid-cell .char-trace{font-size:28px!important}}

function lookup(t) {
  t = t.trim().toLowerCase();
  for (var i = 0; i < DICT.length; i++) {
    if (DICT[i][0] === t) return {chinese:DICT[i][1],pinyin:DICT[i][2],english:DICT[i][0]};
  }
  return null;
}

function isCN(s) { return /[\u4e00-\u9fff]/.test(s); }
function toast(m) { var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000); }
function loadExample(t) { document.getElementById('inputText').value = t; generate(); }

function generate() {
  var input = document.getElementById('inputText').value.trim();
  if (!input) { toast('Please enter some text!'); return; }
  var cellSize = parseInt(document.getElementById('cellSize').value);
  var gridStyle = document.getElementById('gridStyle').value;
  var showTrace = document.getElementById('showTrace').checked;
  var showPinyin = document.getElementById('showPinyin').checked;

  var chars = [], pinyins = [], meanings = [], englishText = '';

  // Try whole phrase lookup first
  var res = lookup(input);
  if (res) {
    for (var i = 0; i < res.chinese.length; i++) {
      chars.push(res.chinese[i]);
      var pp = res.pinyin.split(' ');
      pinyins.push(pp[i] || CP[res.chinese[i]] || '');
    }
    englishText = res.english;
  } else {
    var words = input.split(/\s+/);
    var allEN = true;
    for (var w = 0; w < words.length; w++) { if (isCN(words[w])) { allEN = false; break; } }

      for (var w = 0; w < words.length; w++) {
        var r = lookup(words[w]);
        if (r) {
          englishText += (englishText ? ' ' : '') + words[w];
          for (var i = 0; i < r.chinese.length; i++) {
            chars.push(r.chinese[i]);
            var pp = r.pinyin.split(' ');
            pinyins.push(pp[i] || CP[r.chinese[i]] || '');
            meanings.push(r.english);
          }
        } else {
          // Unknown word - transliterate each char as Chinese character lookup
          englishText += (englishText ? ' ' : '') + words[w];
          for (var i = 0; i < words[w].length; i++) {
            chars.push(words[w][i]);
            pinyins.push(CP[words[w][i]] || '');
          }
        }
      }
    } else {
      for (var i = 0; i < input.length; i++) {
        chars.push(input[i]);
        pinyins.push(CP[input[i]] || '');
      }
      englishText = input;
    }
  }

  // Limit to 24 chars max for display
  if (chars.length > 24) { chars = chars.slice(0, 24); pinyins = pinyins.slice(0, 24); }

  // Render 3 repeats
  var cols = Math.min(chars.length, 8);
  var rows = Math.ceil(chars.length / cols);
  var repeatCount = 3;
  var fontS = Math.floor(cellSize * 0.6);
  var html = '';

  for (var rep = 0; rep < repeatCount; rep++) {
    if (rep > 0) html += '<div style="height:20px"></div>';
    html += '<div class="sheet-grid" style="grid-template-columns:repeat(' + cols + ',' + cellSize + 'px);grid-template-rows:repeat(' + rows + ',' + cellSize + 'px)">';
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var idx = r * cols + c;
        var ch = idx < chars.length ? chars[idx] : '';
        html += '<div class="grid-cell" style="width:' + cellSize + 'px;height:' + cellSize + 'px">';
        if (gridStyle === 'tianzi') html += '<div class="tianzi"></div>';
        else if (gridStyle === 'mizi') html += '<div class="tianzi"></div><div class="tianzi-diag1"></div><div class="tianzi-diag2"></div>';
        if (showTrace && ch) html += '<div class="char-trace" style="font-size:' + fontS + 'px">' + ch + '</div>';
        if (ch) html += '<div class="char-text" style="font-size:' + fontS + 'px' + '">' + ch + '</div>';
        if (ch) html += '<div class="stroke-order"></div>';
        html += '</div>';
      }
    }
    html += '</div>';

    // Pinyin row
    if (showPinyin) {
      html += '<div class="pinyin-row">';
      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          var idx2 = r * cols + c;
          var py = idx2 < pinyins.length ? pinyins[idx2] : '';
          html += '<div class="pinyin-item" style="width:' + cellSize + 'px">' + py + '</div>';
        }
      }
      html += '</div>';
    }
  }

  // Meta
  var metaHtml = '';
  if (englishText) metaHtml += 'English: <em>' + englishText + '</em>';
  if (chars.length > 0 && !englishText) metaHtml += 'Characters: ' + chars.length;
  metaHtml += '<br><span style="font-size:12px;color:#bbb">✍️ Trace the faded characters 3 times each</span>';
  document.getElementById('sheetMeta').innerHTML = metaHtml;

  document.getElementById('sheetContent').innerHTML = html;
  document.getElementById('sheetContainer').classList.add('show');

  // Auto-generate for first load
}
generate();
</script>
</body>
</html>
